<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyLike KBC Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="tick-sound" src="tick.mp3" loop></audio>
    <audio id="reveal-sound" src="reveal.mp3"></audio>

    <div id="point-animation">+1 Point</div>

    <div id="dashboard-screen" class="container">
        <h1 class="main-title neon-text">StudyLike Quizzes</h1>
        <div class="upload-section">
            <p>Nayi Quiz CSV File Upload Karein:</p>
            <input type="file" id="csvFileInput" accept=".csv, text/csv, application/vnd.ms-excel, text/plain, */*">
        </div>
        <div id="quiz-list" class="quiz-list-container"></div>
    </div>

    <div id="quiz-screen" class="container" style="display: none;">
        <div class="header">
            <button id="back-btn" onclick="goBack()">Back</button>
            <div id="q-counter" class="counter neon-text">Q: 1/20</div>
            <div class="score-board neon-text">Score: <span id="score">0</span></div>
        </div>

        <div class="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
        
        <div class="question-box neon-box" id="question-text">
            Question load ho raha hai...
        </div>

        <div class="options-grid">
            <button class="option-btn neon-option" id="opt0" onclick="checkAnswer(0)"></button>
            <button class="option-btn neon-option" id="opt1" onclick="checkAnswer(1)"></button>
            <button class="option-btn neon-option" id="opt2" onclick="checkAnswer(2)"></button>
            <button class="option-btn neon-option" id="opt3" onclick="checkAnswer(3)"></button>
        </div>
        </div>

    <script src="script.js"></script>
</body>
</html>
