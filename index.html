<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyLike KBC Quiz</title>
    
    <style>
        @font-face {
            font-family: 'StudyLikeHindi';
            src: url('hindi.ttf') format('truetype');
        }

        body {
            background-color: #050505; 
            color: white;
            font-family: 'StudyLikeHindi', Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden; 
        }

        .container { 
            width: 100%; 
            height: 100%;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            padding: 20px 20px 5px 20px; /* Neeche thodi jagah signature ke liye chhodi hai */
            box-sizing: border-box;
            position: relative;
        }

        .neon-text-cyan { color: #0ff; text-shadow: 0 0 10px #0ff; text-align: center; }
        .neon-text-pink { color: #f0f; text-shadow: 0 0 10px #f0f; }

        .main-title { text-align: center; font-size: 32px; margin-bottom: 30px; }
        .upload-section { text-align: center; margin-bottom: 20px; }
        .upload-section input { width: 100%; margin-top: 15px; color: #0ff; }
        .quiz-item { background: #111; border: 1px solid #0ff; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 0 10px #0ff; }
        .play-btn { background: #0ff; color: #000; font-weight: bold; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; box-shadow: 0 0 10px #0ff; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 20px; font-weight: bold; }
        .timer-bar-container { width: 100%; height: 8px; background: #222; border-radius: 5px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 0 8px #0ff; }
        #timer-bar { height: 100%; width: 100%; background: #0ff; transition: width 0.1s linear; }

        .question-box {
            flex-grow: 1; 
            max-height: 35%; 
            background: #0a0a0a;
            border: 2px solid #0ff;
            box-shadow: 0 0 15px #0ff;
            border-radius: 15px;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
        }

        .options-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: auto; }

        .option-btn {
            background: #0a0a0a;
            border: 2px solid #f0f;
            box-shadow: 0 0 10px #f0f;
            border-radius: 12px;
            color: white;
            padding: 18px 20px;
            font-size: 20px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            font-family: 'StudyLikeHindi', Arial, sans-serif;
        }

        .opt-letter { color: #f0f; font-weight: bold; margin-right: 15px; font-size: 22px; text-shadow: 0 0 5px #f0f; }

        .correct { background: #002200 !important; border-color: #0f0 !important; box-shadow: 0 0 20px #0f0 !important; }
        .correct .opt-letter { color: #0f0 !important; text-shadow: 0 0 5px #0f0 !important; }
        .wrong { background: #220000 !important; border-color: #f00 !important; box-shadow: 0 0 20px #f00 !important; }
        .wrong .opt-letter { color: #f00 !important; text-shadow: 0 0 5px #f00 !important; }

        #back-btn { opacity: 0; position: absolute; top: 10px; left: 10px; width: 60px; height: 50px; cursor: pointer; z-index: 100; }

        #point-animation { 
            position: absolute; top: -50px; left: 50%; transform: translateX(-50%); font-size: 45px; 
            font-weight: bold; color: #0f0; text-shadow: 0 0 20px #0f0; opacity: 0; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; 
        }
        .show-point { top: 40% !important; opacity: 1 !important; }

        /* BRANDING SIGNATURE CSS */
        .creator-signature {
            text-align: center;
            font-size: 13px;
            color: #666;
            font-family: Arial, sans-serif;
            margin-top: 15px;
            padding-bottom: 5px;
            letter-spacing: 0.5px;
        }
        .creator-signature b { color: #aaa; }
        .creator-handle { color: #0ff; font-weight: bold; text-shadow: 0 0 5px #0ff; margin-left: 5px; }
    </style>
</head>
<body>

    <audio id="tick-sound" src="tick.mp3" loop preload="auto"></audio>
    <audio id="reveal-sound" src="reveal.mp3" preload="auto"></audio>

    <div id="point-animation">+1 Point</div>

    <div id="dashboard-screen" class="container">
        <h1 class="main-title neon-text-cyan">StudyLike Quizzes</h1>
        <div class="upload-section">
            <p style="color: #fff; font-size: 18px;">Nayi Quiz CSV File Upload Karein:</p>
            <input type="file" id="csvFileInput" accept=".csv, text/csv, application/vnd.ms-excel, text/plain, */*">
        </div>
        <div id="quiz-list" class="quiz-list-container"></div>
        
        <div class="creator-signature">
            Created by <b>Anuj Kumar</b> | <span class="creator-handle">@TopStudyPro</span>
        </div>
    </div>

    <div id="quiz-screen" class="container" style="display: none;">
        <div class="header">
            <button id="back-btn" onclick="goBack()">B</button>
            <div id="q-counter" class="counter neon-text-cyan">Q: 1/20</div>
            <div class="score-board neon-text-pink">Score: <span id="score" style="color: white;">0</span></div>
        </div>

        <div class="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
        
        <div class="question-box" id="question-text">
            Question load ho raha hai...
        </div>

        <div class="options-grid">
            <button class="option-btn" id="opt0" onclick="checkAnswer(0)"></button>
            <button class="option-btn" id="opt1" onclick="checkAnswer(1)"></button>
            <button class="option-btn" id="opt2" onclick="checkAnswer(2)"></button>
            <button class="option-btn" id="opt3" onclick="checkAnswer(3)"></button>
        </div>

        <div class="creator-signature">
            App by <b>Anuj Kumar</b> | <span class="creator-handle">@TopStudyPro</span>
        </div>
    </div>

    <script>
        let quizzes = []; 
        let currentQuizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let timeLeft = 5;
        let timerInterval;

        const tickSound = document.getElementById('tick-sound');
        const revealSound = document.getElementById('reveal-sound');

        document.getElementById('csvFileInput').addEventListener('change', function(e) {
            try {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        const parsedData = parseCSV(event.target.result);
                        if(parsedData.length > 0) {
                            quizzes.push({ name: file.name, data: parsedData });
                            renderQuizList();
                            alert(`Success! ${parsedData.length} Hindi questions load ho gaye.`);
                        } else {
                            alert("File format check karein.");
                        }
                    } catch(err) { alert(err.message); }
                };
                reader.readAsText(file, 'UTF-8');
            } catch(err) { alert(err.message); }
        });

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            const questions = [];
            for(let i = 1; i < lines.length; i++) {
                let line = lines[i].trim();
                if(line === '') continue;
                
                let cols = line.split(',');
                if(cols.length >= 6) {
                    cols = cols.map(c => c.replace(/^"|"$/g, '').trim());
                    let ansLetter = cols[5].toUpperCase();
                    let ansIndex = ansLetter === 'A' ? 0 : ansLetter === 'B' ? 1 : ansLetter === 'C' ? 2 : 3;
                    
                    questions.push({ q: cols[0], options: [cols[1], cols[2], cols[3], cols[4]], answer: ansIndex });
                }
            }
            return questions;
        }

        function renderQuizList() {
            const listDiv = document.getElementById('quiz-list');
            listDiv.innerHTML = '';
            quizzes.forEach((quiz, index) => {
                listDiv.innerHTML += `
                    <div class="quiz-item">
                        <div class="neon-text-cyan"><strong>${quiz.name}</strong><br><small style="color:#fff;">${quiz.data.length} Questions</small></div>
                        <button class="play-btn" onclick="startQuiz(${index})">▶ Play</button>
                    </div>
                `;
            });
        }

        function startQuiz(quizIndex) {
            tickSound.play().then(() => tickSound.pause()).catch(e => console.log(e));
            revealSound.play().then(() => revealSound.pause()).catch(e => console.log(e));

            currentQuizData = quizzes[quizIndex].data;
            currentQuestionIndex = 0;
            score = 0;
            document.getElementById('dashboard-screen').style.display = 'none';
            document.getElementById('quiz-screen').style.display = 'block';
            document.getElementById('score').innerText = score;
            loadQuestion();
        }

        function goBack() {
            clearInterval(timerInterval);
            tickSound.pause();
            document.getElementById('quiz-screen').style.display = 'none';
            document.getElementById('dashboard-screen').style.display = 'block';
        }

        function loadQuestion() {
            const currentQuestion = currentQuizData[currentQuestionIndex];
            document.getElementById('question-text').innerText = currentQuestion.q;
            document.getElementById('q-counter').innerText = `Q: ${currentQuestionIndex + 1}/${currentQuizData.length}`;

            const labels = ['A', 'B', 'C', 'D'];

            for(let i = 0; i < 4; i++) {
                let btn = document.getElementById(`opt${i}`);
                btn.innerHTML = `<span class="opt-letter">${labels[i]}:</span> <span style="flex-grow:1;">${currentQuestion.options[i]}</span>`;
                btn.className = "option-btn"; 
                btn.disabled = false; 
            }
            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 5.0;
            const timerBar = document.getElementById('timer-bar');
            timerBar.style.width = '100%';
            timerBar.style.backgroundColor = '#0ff'; 
            
            tickSound.currentTime = 0;
            tickSound.play().catch(e => console.log(e));

            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                timerBar.style.width = ((timeLeft / 5) * 100) + '%';

                if(timeLeft <= 2) { timerBar.style.backgroundColor = '#f00'; } 

                if(timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerBar.style.width = '0%';
                    tickSound.pause();
                    autoRevealAnswer();
                }
            }, 100);
        }

        function checkAnswer(selectedIndex) {
            clearInterval(timerInterval); 
            tickSound.pause();
            revealSound.currentTime = 0;
            revealSound.play().catch(e => console.log(e));

            const currentQuestion = currentQuizData[currentQuestionIndex];
            
            if(selectedIndex === currentQuestion.answer) {
                document.getElementById(`opt${selectedIndex}`).classList.add('correct');
                score += 1; 
                document.getElementById('score').innerText = score;
                triggerPointAnimation(); 
            } else {
                document.getElementById(`opt${selectedIndex}`).classList.add('wrong');
                document.getElementById(`opt${currentQuestion.answer}`).classList.add('correct');
            }
            lockAndProceed();
        }

        function autoRevealAnswer() {
            revealSound.currentTime = 0;
            revealSound.play().catch(e => console.log(e));
            const currentQuestion = currentQuizData[currentQuestionIndex];
            document.getElementById(`opt${currentQuestion.answer}`).classList.add('correct');
            lockAndProceed();
        }

        function triggerPointAnimation() {
            const pointAnim = document.getElementById('point-animation');
            pointAnim.classList.add('show-point');
            setTimeout(() => {
                pointAnim.classList.remove('show-point');
            }, 2000); 
        }

        function lockAndProceed() {
            for(let i = 0; i < 4; i++) {
                document.getElementById(`opt${i}`).disabled = true;
            }
            setTimeout(() => {
                currentQuestionIndex++;
                if(currentQuestionIndex < currentQuizData.length) {
                    loadQuestion();
                } else {
                    document.getElementById('question-text').innerText = `Quiz Complete!\nScore: ${score}`;
                    document.querySelector('.options-grid').style.display = "none";
                    document.getElementById('timer-bar').style.width = '0%';
                }
            }, 7000);
        }
    </script>
</body>
</html>
